<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nate🌿</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Italianno&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-viewport">
        <div class="ui-controls">
            <button id="backBtn" class="control-btn">← Back</button>
            <button id="musicToggle" class="control-btn">🎵 Music: Off</button>
        </div>
        
        <div class="bouquet-scene" id="bouquet">
            <div id="particle-container"></div>

            <div class="outer-wrap-layer"></div>
            <div class="inner-wrap-layer" id="wrap"></div>

            <div class="bouquet-contents">
                <div class="roses-arrangement">
                    <div class="rose-container o1">
                        <div class="rose satin-teal"><div class="rose-inner"></div></div>
                        <div class="stem"></div>
                    </div>
                    <div class="rose-container o2">
                        <div class="rose satin-teal"><div class="rose-inner"></div></div>
                        <div class="stem"></div>
                    </div>
                    <div class="rose-container o3">
                        <div class="rose satin-teal"><div class="rose-inner"></div></div>
                        <div class="stem"></div>
                    </div>
                    <div class="rose-container o4">
                        <div class="rose satin-teal"><div class="rose-inner"></div></div>
                        <div class="stem"></div>
                    </div>
                    <div class="rose-container o5">
                        <div class="rose satin-teal"><div class="rose-inner"></div></div>
                        <div class="stem"></div>
                    </div>
                </div>
            </div>

            <div class="photo-popup" id="photoPopup">
                <img src="images/haha.jpg" alt="Memory">
            </div>

            <div class="bouquet-ribbon">
                <div class="marquee-wrapper">
                    <span class="marquee-text">MISS YOU &nbsp;&nbsp;&nbsp; PALANGGA &nbsp;&nbsp;&nbsp; MISS YOU &nbsp;&nbsp;&nbsp; PALANGGA &nbsp;&nbsp;&nbsp; MISS YOU &nbsp;&nbsp;&nbsp; PALANGGA &nbsp;&nbsp;&nbsp; MISS YOU &nbsp;&nbsp;&nbsp; PALANGGA &nbsp;&nbsp;&nbsp;</span>
                </div>
            </div>
        </div>
        
        <div class="tap-hint">Tap to Bloom</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
